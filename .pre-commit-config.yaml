default_language_version:
  python: python3

default_stages: [pre-commit]

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
  autofix_commit_msg: "fix(pre_commit): auto format pre-commit hooks"
  autoupdate_commit_msg: "chore(pre_commit): pre_commit autoupdate"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        exclude: mkdocs.yml
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-case-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: pretty-format-json
        exclude: demo.ipynb
        args: ["--autofix", "--no-sort-keys", "--indent=4"]
      - id: end-of-file-fixer
      - id: mixed-line-ending

  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.8.1
    hooks:
      - id: prettier
        files: \.(ya?ml|toml)$
        args: ["--print-width=120"]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.20.0
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - "mdformat-mkdocs[recommended]>=2.1.0"
          - "mdformat-ruff"
        args: ["--number"]
        exclude: ^(docs/changelog\.md|docs/deprecated\.md|CONTRIBUTING\.md)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - "numpy>=2.0"
          - "types-PyYAML"
          - "types-requests"

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ['--ignore-words', '.codespell-ignore']
        exclude: '\.lock$'
        additional_dependencies:
          - "tomli>=2.0.1"
